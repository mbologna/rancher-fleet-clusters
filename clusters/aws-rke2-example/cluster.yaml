# Example: AWS RKE2 cluster via CAPA + CAPRKE2
# Uses the aws-rke2 ClusterClass defined in clusterclasses/aws-rke2/
# CAPI contract: v1beta2
#
# Before applying, fill in the variables below:
#   1. amiID     - AMI ID of a base OS image (Ubuntu 22.04, RHEL 9, etc.)
#                  CAPRKE2 installs RKE2 automatically at boot via cloud-init.
#                  Find Ubuntu 22.04 AMI for eu-west-1:
#                    aws ec2 describe-images --owners 099720109477 \
#                      --filters "Name=name,Values=ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*" \
#                                "Name=state,Values=available" \
#                      --query 'sort_by(Images,&CreationDate)[-1].ImageId' \
#                      --output text --region eu-west-1
#   2. sshKeyName - an existing EC2 key pair in your account (for debug SSH access)
#   3. Ensure AWS credentials Secret "cluster-identity" exists in namespace "default"
#      (created automatically by Ansible — do not add it here)
#   4. Ensure IAM profiles exist: clusterawsadm bootstrap iam create-cloudformation-stack
#
# AWSClusterStaticIdentity references the "cluster-identity" Secret created by Ansible.
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSClusterStaticIdentity
metadata:
  name: cluster-identity
  namespace: default
spec:
  secretRef: cluster-identity
  allowedNamespaces: {}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: aws-rke2-example
  namespace: default
  labels:
    cluster-api.cattle.io/rancher-auto-import: "true"
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 192.168.0.0/16
    services:
      cidrBlocks:
        - 10.96.0.0/12
  topology:
    classRef:
      name: aws-rke2
      namespace: default
    version: v1.33.10+rke2r3
    controlPlane:
      replicas: 1   # increase to 3 for HA
    workers:
      machineDeployments:
        - class: default-worker
          name: workers
          replicas: 2
    variables:
      - name: region
        value: "eu-west-1"
      - name: sshKeyName
        value: "my-aws-key"   # CHANGE ME — an existing EC2 key pair name
      - name: controlPlaneMachineType
        value: "t3.large"
      - name: workerMachineType
        value: "t3.large"
      - name: amiID
        value: "ami-CHANGE_ME"   # CHANGE ME — see instructions above
      - name: cni
        value: "calico"
      - name: awsClusterIdentityName
        value: "cluster-identity"
