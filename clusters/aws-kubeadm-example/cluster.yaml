# Example: AWS kubeadm cluster via CAPA + KubeadmControlPlane
# Uses the aws-kubeadm ClusterClass defined in clusterclasses/aws-kubeadm/
#
# Before applying:
#   1. Set sshKeyName to an existing EC2 key pair
#   2. Ensure CAPA is initialized with AWS credentials
#   3. Ensure the IAM instance profiles exist:
#      clusterawsadm bootstrap iam create-cloudformation-stack
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: aws-kubeadm-example
  namespace: default
  labels:
    cluster-api.cattle.io/rancher-auto-import: "true"
spec:
  clusterNetwork:
    pods:
      cidrBlocks: ["192.168.0.0/16"]
    services:
      cidrBlocks: ["10.96.0.0/12"]
  topology:
    class: aws-kubeadm
    version: v1.33.10
    controlPlane:
      replicas: 1
    workers:
      machineDeployments:
        - class: default-worker
          name: workers
          replicas: 2
    variables:
      - name: region
        value: "eu-west-1"
      - name: sshKeyName
        value: "my-aws-key"   # CHANGE ME
      - name: controlPlaneInstanceType
        value: "t3.large"
      - name: workerInstanceType
        value: "t3.large"
      - name: k8sVersion
        value: "v1.33.10"
