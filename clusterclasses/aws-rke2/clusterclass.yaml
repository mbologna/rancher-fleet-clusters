# ClusterClass: aws-rke2
# Infrastructure: CAPA (AWS EC2 machines)
# Control plane:  CAPRKE2 (RKE2ControlPlane)
# Workers:        CAPRKE2 (RKE2ConfigTemplate)
# CAPI contract:  v1beta2 for Cluster/ClusterClass, CAPA infra types, and CAPRKE2 types
# Note: v1beta2 ClusterClass uses templateRef (not ref) for all template references
#
# Variables exposed by this ClusterClass:
#   region                 - AWS region (default: eu-west-1)
#   sshKeyName             - EC2 key pair name (default: "default")
#   controlPlaneMachineType - EC2 type for control plane nodes (default: t3.large)
#   workerMachineType      - EC2 type for worker nodes (default: t3.large)
#   amiID                  - REQUIRED: AMI ID of an OS image for the EC2 instances.
#                            CAPRKE2 installs RKE2 at boot via cloud-init, so any
#                            standard base OS image works (Ubuntu 22.04, RHEL 9, etc.).
#                            Find AMI IDs in the AWS Console or via:
#                              aws ec2 describe-images --owners 099720109477 \
#                                --filters "Name=name,Values=ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64*" \
#                                --query 'sort_by(Images,&CreationDate)[-1].ImageId' \
#                                --region eu-west-1
#   cni                    - CNI plugin (default: calico)
#   awsClusterIdentityName - AWSClusterStaticIdentity resource name (default: cluster-identity)
#                            Credentials are created as a Secret by Ansible (not in this repo).
#
# Prerequisites (one-time per AWS account):
#   clusterawsadm bootstrap iam create-cloudformation-stack
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: ClusterClass
metadata:
  name: aws-rke2
  namespace: default
spec:
  controlPlane:
    templateRef:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta2
      kind: RKE2ControlPlaneTemplate
      name: aws-rke2-control-plane
    machineInfrastructure:
      templateRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: AWSMachineTemplate
        name: aws-rke2-control-plane-machine

  infrastructure:
    templateRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: AWSClusterTemplate
      name: aws-rke2-cluster

  workers:
    machineDeployments:
      - class: default-worker
        bootstrap:
          templateRef:
            apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
            kind: RKE2ConfigTemplate
            name: aws-rke2-worker
        infrastructure:
          templateRef:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            name: aws-rke2-worker-machine

  variables:
    - name: region
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: "eu-west-1"
    - name: sshKeyName
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: "default"
    - name: controlPlaneMachineType
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: "t3.large"
    - name: workerMachineType
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: "t3.large"
    - name: amiID
      required: true
      schema:
        openAPIV3Schema:
          type: string
          description: "AMI ID for EC2 instances. Use any standard OS AMI (Ubuntu 22.04, RHEL 9, etc.) — CAPRKE2 installs RKE2 at boot."
    - name: cni
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: "calico"
    - name: awsClusterIdentityName
      required: true
      schema:
        openAPIV3Schema:
          type: string
          description: "Name of the AWSClusterStaticIdentity resource referencing AWS credentials."
          default: "cluster-identity"
    - name: vpcID
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: ""
          description: "Existing VPC ID to use instead of creating a new one. Leave empty to let CAPA create a VPC."
    - name: subnetID
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: ""
          description: "Existing subnet ID for EC2 instances. Required when vpcID is set."
    - name: publicIP
      required: false
      schema:
        openAPIV3Schema:
          type: boolean
          default: false
          description: "Assign public IPs to EC2 instances. Set to true when using a public subnet without NAT gateway."

  patches:
    - name: awsClusterTemplate
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/region
              valueFrom:
                variable: region
            - op: add
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName
    - name: clusterIdentity
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/identityRef/name
              valueFrom:
                variable: awsClusterIdentityName
    - name: existingVpc
      enabledIf: '{{ ne .vpcID "" }}'
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/network/vpc
              valueFrom:
                template: '{"id": "{{ .vpcID }}"}'
            - op: add
              path: /spec/template/spec/network/subnets
              valueFrom:
                template: '[{"id": "{{ .subnetID }}", "resourceID": "{{ .subnetID }}", "isPublic": {{ .publicIP }}}]'
    - name: awsMachineTemplateControlPlane
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: replace
              path: /spec/template/spec/instanceType
              valueFrom:
                variable: controlPlaneMachineType
            - op: add
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName
            - op: add
              path: /spec/template/spec/ami/id
              valueFrom:
                variable: amiID
    - name: controlPlaneSubnet
      enabledIf: '{{ ne .subnetID "" }}'
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/subnet
              valueFrom:
                template: '{"id": "{{ .subnetID }}"}'
            - op: add
              path: /spec/template/spec/publicIP
              valueFrom:
                variable: publicIP
    - name: awsMachineTemplateWorker
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              machineDeploymentClass:
                names:
                  - default-worker
          jsonPatches:
            - op: replace
              path: /spec/template/spec/instanceType
              valueFrom:
                variable: workerMachineType
            - op: add
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName
            - op: add
              path: /spec/template/spec/ami/id
              valueFrom:
                variable: amiID
    - name: workerSubnet
      enabledIf: '{{ ne .subnetID "" }}'
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              machineDeploymentClass:
                names:
                  - default-worker
          jsonPatches:
            - op: add
              path: /spec/template/spec/subnet
              valueFrom:
                template: '{"id": "{{ .subnetID }}"}'
            - op: add
              path: /spec/template/spec/publicIP
              valueFrom:
                variable: publicIP
    - name: rke2ControlPlaneTemplate
      definitions:
        - selector:
            apiVersion: controlplane.cluster.x-k8s.io/v1beta2
            kind: RKE2ControlPlaneTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/serverConfig/cni
              valueFrom:
                variable: cni
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSClusterTemplate
metadata:
  name: aws-rke2-cluster
  namespace: default
  annotations:
    # CAPA's admission webhook marks AWSClusterTemplate.spec as immutable after first
    # creation. This annotation tells Helm/Fleet to skip updates on this resource.
    helm.sh/resource-policy: keep
    # Fleet: do not manage (update/delete) this resource — it is immutable in CAPA v2.
    objectset.rio.cattle.io/ignore: "true"
spec:
  template:
    spec:
      identityRef:
        kind: AWSClusterStaticIdentity
        name: cluster-identity   # overridden by clusterIdentity patch
      bastion:
        enabled: false
      controlPlaneLoadBalancer:
        additionalListeners:
          - port: 9345
            protocol: TCP
          - port: 2379
            protocol: TCP
        ingressRules:
          - description: RKE2 Control Plane
            fromPort: 9345
            cidrBlocks:
              - 10.0.0.0/8
            protocol: tcp
            toPort: 9345
          - cidrBlocks:
              - 0.0.0.0/0
            description: Kubernetes API
            fromPort: 6443
            protocol: tcp
            toPort: 6443
          - description: Etcd
            fromPort: 2379
            cidrBlocks:
              - 10.0.0.0/8
            protocol: tcp
            toPort: 2379
          - description: Etcd peer
            fromPort: 2380
            cidrBlocks:
              - 10.0.0.0/8
            protocol: tcp
            toPort: 2380
        loadBalancerType: nlb
      network:
        cni:
          cniIngressRules:
            - description: BGP
              fromPort: 179
              protocol: tcp
              toPort: 179
            - description: IP-in-IP
              fromPort: -1
              protocol: "4"
              toPort: 65535
            - description: VXLAN (Calico)
              fromPort: 4789
              protocol: udp
              toPort: 4789
            - description: Calico Typha
              fromPort: 5473
              protocol: tcp
              toPort: 5473
            - description: Calico Typha health check
              fromPort: 9098
              protocol: tcp
              toPort: 9098
            - description: Calico health check
              fromPort: 9099
              protocol: tcp
              toPort: 9099
        additionalControlPlaneIngressRules:
          - description: RKE2 Control Plane
            fromPort: 9345
            cidrBlocks:
              - 10.0.0.0/8
            protocol: tcp
            toPort: 9345
          - description: RKE2 Control Plane additional group
            fromPort: 9345
            protocol: tcp
            sourceSecurityGroupRoles:
              - node
              - controlplane
              - apiserver-lb
              - lb
            toPort: 9345
          - description: Etcd
            fromPort: 2379
            cidrBlocks:
              - 10.0.0.0/8
            protocol: tcp
            toPort: 2379
          - description: Etcd peer
            fromPort: 2380
            cidrBlocks:
              - 10.0.0.0/8
            protocol: tcp
            toPort: 2380
        vpc:
          availabilityZoneUsageLimit: 1
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: RKE2ControlPlaneTemplate
metadata:
  name: aws-rke2-control-plane
  namespace: default
spec:
  template:
    spec:
      preRKE2Commands:
        - sudo hostnamectl set-hostname $(curl -s http://169.254.169.254/1.0/meta-data/hostname)
        # RKE2 install retries: GitHub CDN occasionally returns 502; retry up to 10 times
        - |
          for i in $(seq 1 10); do
            curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION=v1.33.10+rke2r3 sh -s - && break
            echo "RKE2 install attempt $i failed, retrying in 30s..."
            sleep 30
          done
        # AWS internet-facing NLBs resolve to public IPs even from within the same VPC, causing
        # asymmetric routing (hairpin) on port 9345. Fix: scan the local subnet for a host
        # responding on port 9345 (RKE2 supervisor) and map the NLB DNS to that private IP.
        # This is a no-op for the initial control-plane node (nothing listens on 9345 yet).
        - |
          SUBNET=$(ip route | awk '/scope link/{print $1}' | head -1 | cut -d/ -f1 | awk -F. '{print $1"."$2"."$3}')
          for i in $(seq 1 254); do
            if nc -z -w1 "${SUBNET}.${i}" 9345 2>/dev/null; then
              NLB_PRIVATE_IP="${SUBNET}.${i}"
              break
            fi
          done
          if [ -n "${NLB_PRIVATE_IP}" ]; then
            NLB_DNS=$(grep '^server:' /etc/rancher/rke2/config.yaml | sed 's|server: https://||;s|:9345||')
            echo "${NLB_PRIVATE_IP} ${NLB_DNS}" | sudo tee -a /etc/hosts
          fi
      agentConfig:
        kubelet:
          extraArgs:
            - --cloud-provider=external
            - --node-labels=capi-managed=true
      serverConfig:
        cloudProviderName: external
        etcd:
          backupConfig:
            retention: "10"
            scheduleCron: "*/15 * * * *"
      rolloutStrategy:
        type: "RollingUpdate"
        rollingUpdate:
          maxSurge: 1
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: aws-rke2-control-plane-machine
  namespace: default
  annotations:
    helm.sh/resource-policy: keep
    objectset.rio.cattle.io/ignore: "true"
spec:
  template:
    spec:
      ami:
        id: to_be_replaced   # overridden by awsMachineTemplateControlPlane patch
      cloudInit:
        insecureSkipSecretsManager: true
      iamInstanceProfile: "control-plane.cluster-api-provider-aws.sigs.k8s.io"
      instanceType: t3.large   # overridden by awsMachineTemplateControlPlane patch
      rootVolume:
        size: 50
        type: gp3
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: aws-rke2-worker-machine
  namespace: default
  annotations:
    helm.sh/resource-policy: keep
    objectset.rio.cattle.io/ignore: "true"
spec:
  template:
    spec:
      ami:
        id: to_be_replaced   # overridden by awsMachineTemplateWorker patch
      cloudInit:
        insecureSkipSecretsManager: true
      iamInstanceProfile: "nodes.cluster-api-provider-aws.sigs.k8s.io"
      instanceType: t3.large   # overridden by awsMachineTemplateWorker patch
      rootVolume:
        size: 50
        type: gp3
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: RKE2ConfigTemplate
metadata:
  name: aws-rke2-worker
  namespace: default
spec:
  template:
    spec:
      agentConfig:
        kubelet:
          extraArgs:
            - --cloud-provider=external
            - --node-labels=capi-managed=true
      preRKE2Commands:
        - sudo hostnamectl set-hostname $(curl -s http://169.254.169.254/1.0/meta-data/hostname)
        # RKE2 install retries: GitHub CDN occasionally returns 502; retry up to 10 times
        - |
          for i in $(seq 1 10); do
            curl -sfL https://get.rke2.io | INSTALL_RKE2_VERSION=v1.33.10+rke2r3 INSTALL_RKE2_TYPE="agent" sh -s - && break
            echo "RKE2 install attempt $i failed, retrying in 30s..."
            sleep 30
          done
        # AWS internet-facing NLBs resolve to public IPs even from within the same VPC, causing
        # asymmetric routing (hairpin) on port 9345. Fix: scan the local subnet for a host
        # responding on port 9345 (RKE2 supervisor) and map the NLB DNS to that private IP.
        - |
          SUBNET=$(ip route | awk '/scope link/{print $1}' | head -1 | cut -d/ -f1 | awk -F. '{print $1"."$2"."$3}')
          for i in $(seq 1 254); do
            if nc -z -w1 "${SUBNET}.${i}" 9345 2>/dev/null; then
              NLB_PRIVATE_IP="${SUBNET}.${i}"
              break
            fi
          done
          if [ -n "${NLB_PRIVATE_IP}" ]; then
            NLB_DNS=$(grep '^server:' /etc/rancher/rke2/config.yaml | sed 's|server: https://||;s|:9345||')
            echo "${NLB_PRIVATE_IP} ${NLB_DNS}" | sudo tee -a /etc/hosts
          fi
