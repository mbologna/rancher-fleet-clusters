# ClusterClass: aws-rke2
# Infrastructure: CAPA (AWS EC2 machines)
# Control plane:  CAPRKE2 (RKE2ControlPlane)
# Workers:        CAPRKE2 (RKE2ConfigTemplate)
# CAPI contract:  v1beta1 (ClusterClass/Cluster); v1beta2 for infra/controlplane types
#
# Variables exposed by this ClusterClass:
#   region                 - AWS region (default: eu-west-1)
#   sshKeyName             - EC2 key pair name (default: "default")
#   controlPlaneMachineType - EC2 type for control plane nodes (default: t3.large)
#   workerMachineType      - EC2 type for worker nodes (default: t3.large)
#   amiID                  - REQUIRED: AMI ID of an OS image for the EC2 instances.
#                            CAPRKE2 installs RKE2 at boot via cloud-init, so any
#                            standard base OS image works (Ubuntu 22.04, RHEL 9, etc.).
#                            Find AMI IDs in the AWS Console or via:
#                              aws ec2 describe-images --owners 099720109477 \
#                                --filters "Name=name,Values=ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64*" \
#                                --query 'sort_by(Images,&CreationDate)[-1].ImageId' \
#                                --region eu-west-1
#   cni                    - CNI plugin (default: calico)
#   awsClusterIdentityName - AWSClusterStaticIdentity resource name (default: cluster-identity)
#                            Credentials are created as a Secret by Ansible (not in this repo).
#
# Prerequisites (one-time per AWS account):
#   clusterawsadm bootstrap iam create-cloudformation-stack
---
apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: aws-rke2
  namespace: default
spec:
  controlPlane:
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta2
      kind: RKE2ControlPlaneTemplate
      name: aws-rke2-control-plane
    machineInfrastructure:
      ref:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
        kind: AWSMachineTemplate
        name: aws-rke2-control-plane-machine

  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: AWSClusterTemplate
      name: aws-rke2-cluster

  workers:
    machineDeployments:
      - class: default-worker
        template:
          bootstrap:
            ref:
              apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
              kind: RKE2ConfigTemplate
              name: aws-rke2-worker
          infrastructure:
            ref:
              apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
              kind: AWSMachineTemplate
              name: aws-rke2-worker-machine

  variables:
    - name: region
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: "eu-west-1"
    - name: sshKeyName
      required: false
      schema:
        openAPIV3Schema:
          type: string
          default: "default"
    - name: controlPlaneMachineType
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: "t3.large"
    - name: workerMachineType
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: "t3.large"
    - name: amiID
      required: true
      schema:
        openAPIV3Schema:
          type: string
          description: "AMI ID for EC2 instances. Use any standard OS AMI (Ubuntu 22.04, RHEL 9, etc.) — CAPRKE2 installs RKE2 at boot."
    - name: cni
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: "calico"
    - name: awsClusterIdentityName
      required: true
      schema:
        openAPIV3Schema:
          type: string
          description: "Name of the AWSClusterStaticIdentity resource referencing AWS credentials."
          default: "cluster-identity"

  patches:
    - name: awsClusterTemplate
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/region
              valueFrom:
                variable: region
            - op: add
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName
    - name: clusterIdentity
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/identityRef/name
              valueFrom:
                variable: awsClusterIdentityName
    - name: awsMachineTemplateControlPlane
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: replace
              path: /spec/template/spec/instanceType
              valueFrom:
                variable: controlPlaneMachineType
            - op: add
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName
            - op: add
              path: /spec/template/spec/ami/id
              valueFrom:
                variable: amiID
    - name: awsMachineTemplateWorker
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
            kind: AWSMachineTemplate
            matchResources:
              machineDeploymentClass:
                names:
                  - default-worker
          jsonPatches:
            - op: replace
              path: /spec/template/spec/instanceType
              valueFrom:
                variable: workerMachineType
            - op: add
              path: /spec/template/spec/sshKeyName
              valueFrom:
                variable: sshKeyName
            - op: add
              path: /spec/template/spec/ami/id
              valueFrom:
                variable: amiID
    - name: rke2ControlPlaneTemplate
      definitions:
        - selector:
            apiVersion: controlplane.cluster.x-k8s.io/v1beta2
            kind: RKE2ControlPlaneTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/serverConfig/cni
              valueFrom:
                variable: cni
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSClusterTemplate
metadata:
  name: aws-rke2-cluster
  namespace: default
spec:
  template:
    spec:
      identityRef:
        kind: AWSClusterStaticIdentity
        name: cluster-identity   # overridden by clusterIdentity patch
      bastion:
        enabled: false
      controlPlaneLoadBalancer:
        additionalListeners:
          - port: 9345
            protocol: TCP
          - port: 2379
            protocol: TCP
        ingressRules:
          - description: RKE2 Control Plane
            fromPort: 9345
            natGatewaysIPsSource: true
            protocol: tcp
            toPort: 9345
          - cidrBlocks:
              - 0.0.0.0/0
            description: Kubernetes API
            fromPort: 6443
            protocol: tcp
            toPort: 6443
          - description: Etcd
            fromPort: 2379
            natGatewaysIPsSource: true
            protocol: tcp
            toPort: 2379
          - description: Etcd peer
            fromPort: 2380
            natGatewaysIPsSource: true
            protocol: tcp
            toPort: 2380
        loadBalancerType: nlb
      network:
        cni:
          cniIngressRules:
            - description: BGP
              fromPort: 179
              protocol: tcp
              toPort: 179
            - description: IP-in-IP
              fromPort: -1
              protocol: "4"
              toPort: 65535
            - description: Calico Typha
              fromPort: 5473
              protocol: tcp
              toPort: 5473
            - description: Calico Typha health check
              fromPort: 9098
              protocol: tcp
              toPort: 9098
            - description: Calico health check
              fromPort: 9099
              protocol: tcp
              toPort: 9099
        additionalControlPlaneIngressRules:
          - description: RKE2 Control Plane
            fromPort: 9345
            natGatewaysIPsSource: true
            protocol: tcp
            toPort: 9345
          - description: RKE2 Control Plane additional group
            fromPort: 9345
            protocol: tcp
            sourceSecurityGroupRoles:
              - node
              - controlplane
              - apiserver-lb
              - lb
            toPort: 9345
          - description: Etcd
            fromPort: 2379
            natGatewaysIPsSource: true
            protocol: tcp
            toPort: 2379
          - description: Etcd peer
            fromPort: 2380
            natGatewaysIPsSource: true
            protocol: tcp
            toPort: 2380
        vpc:
          availabilityZoneUsageLimit: 1
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: RKE2ControlPlaneTemplate
metadata:
  name: aws-rke2-control-plane
  namespace: default
spec:
  template:
    spec:
      preRKE2Commands:
        - sudo hostnamectl set-hostname $(curl -s http://169.254.169.254/1.0/meta-data/hostname)
      agentConfig:
        kubelet:
          extraArgs:
            - --cloud-provider=external
      serverConfig:
        cloudProviderName: external
        etcd:
          backupConfig:
            retention: "10"
            scheduleCron: "*/15 * * * *"
      rolloutStrategy:
        type: "RollingUpdate"
        rollingUpdate:
          maxSurge: 1
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: aws-rke2-control-plane-machine
  namespace: default
spec:
  template:
    spec:
      ami:
        id: to_be_replaced   # overridden by awsMachineTemplateControlPlane patch
      iamInstanceProfile: "control-plane.cluster-api-provider-aws.sigs.k8s.io"
      instanceType: t3.large   # overridden by awsMachineTemplateControlPlane patch
      rootVolume:
        size: 50
        type: gp3
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSMachineTemplate
metadata:
  name: aws-rke2-worker-machine
  namespace: default
spec:
  template:
    spec:
      ami:
        id: to_be_replaced   # overridden by awsMachineTemplateWorker patch
      iamInstanceProfile: "nodes.cluster-api-provider-aws.sigs.k8s.io"
      instanceType: t3.large   # overridden by awsMachineTemplateWorker patch
      rootVolume:
        size: 50
        type: gp3
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: RKE2ConfigTemplate
metadata:
  name: aws-rke2-worker
  namespace: default
spec:
  template:
    spec:
      agentConfig:
        kubelet:
          extraArgs:
            - --cloud-provider=external
      preRKE2Commands:
        - sudo hostnamectl set-hostname $(curl -s http://169.254.169.254/1.0/meta-data/hostname)
