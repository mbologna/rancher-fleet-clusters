# Metal3 / Ironic Credentials
# ============================
# CAPM3 connects to Ironic over HTTP/HTTPS. These Secrets are read by the
# capm3-system controller at startup.
#
# Prerequisites:
#   - A running Ironic instance accessible from the management cluster
#   - DHCP server and PXE/iPXE boot capability on the baremetal network
#   - BareMetalHost CRDs provided by metal3-io/baremetal-operator
#
# Fill in IRONIC_URL and credentials, then commit to your private fork.
---
apiVersion: v1
kind: Secret
metadata:
  name: ironic-credentials
  namespace: capm3-system
type: Opaque
stringData:
  # URL to the Ironic HTTP API (e.g. http://192.168.1.5:6385/v1/)
  IRONIC_URL: "http://CHANGE_ME:6385/v1/"
  # URL to the Ironic Inspector API (e.g. http://192.168.1.5:5050/v1/)
  IRONIC_INSPECTOR_URL: "http://CHANGE_ME:5050/v1/"
  # HTTP basic auth credentials if Ironic is configured with auth
  IRONIC_USERNAME: "CHANGE_ME"
  IRONIC_PASSWORD: "CHANGE_ME"
---
# BMC Secret template — one per physical host (BareMetalHost)
# The BareMetalHost CR references this by name.
# Copy and rename for each host you want to provision.
apiVersion: v1
kind: Secret
metadata:
  name: bmc-secret-host-01   # rename per host (e.g. bmc-secret-worker-01)
  namespace: default
type: Opaque
stringData:
  username: "CHANGE_ME"   # BMC username (IPMI / Redfish)
  password: "CHANGE_ME"   # BMC password
