# CAPA AWS Credentials Secret
# ==========================
# Fill in your AWS credentials below, then commit to your private fork.
# CAPA looks for this Secret automatically by name in the capa-system namespace.
#
# To get your credentials:
#   - Static keys:     AWS Console → IAM → Users → your user → Security credentials
#   - Session token:   run `aws sts get-session-token` if using MFA or assumed roles
#
# Required IAM permissions for CAPA:
#   ec2:*, elasticloadbalancing:*, iam:PassRole, iam:GetRole,
#   iam:CreateServiceLinkedRole, route53:*, s3:GetObject
#
# One-time IAM bootstrap (run once per AWS account, not per cluster):
#   clusterawsadm bootstrap iam create-cloudformation-stack
#   This creates the instance profiles used by control-plane and worker nodes.
---
apiVersion: v1
kind: Secret
metadata:
  name: capa-manager-bootstrap-credentials
  namespace: capa-system
type: Opaque
stringData:
  # AWS credentials file format — exactly as ~/.aws/credentials
  credentials: |
    [default]
    aws_access_key_id = CHANGE_ME
    aws_secret_access_key = CHANGE_ME
    # aws_session_token = CHANGE_ME   # only needed for temporary/MFA credentials
