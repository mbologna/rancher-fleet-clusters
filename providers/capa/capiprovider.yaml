# CAPA (Cluster API Provider AWS) CAPIProvider
# Installs the AWS infrastructure provider into the management cluster.
#
# Credentials:
#   - capa-credentials (capa-system): created by Turtles from spec.variables. Patch it
#     with AWS_B64ENCODED_CREDENTIALS after Fleet deploys (see README).
#   - cluster-identity (capa-system): pre-created by the user, referenced by
#     AWSClusterStaticIdentity to authenticate CAPI cluster operations.
#
# One-time IAM bootstrap (run once per AWS account):
#   clusterawsadm bootstrap iam create-cloudformation-stack
---
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: aws
  namespace: capa-system
spec:
  name: aws
  type: infrastructure
  version: "v2.10.2"   # latest CAPA release
  fetchConfig:
    url: https://github.com/kubernetes-sigs/cluster-api-provider-aws/releases/download/v2.10.2/infrastructure-components.yaml
  configSecret:
    # Secret "capa-credentials" is created by Ansible (not in this public repo).
    # It provides AWS_B64ENCODED_CREDENTIALS for the CAPA component manifest substitution.
    name: capa-credentials
  variables:
    AWS_REGION: "eu-west-1"   # default region; overridden per cluster via ClusterClass variable
    EXP_MACHINE_POOL: "true"
    EXP_CLUSTER_RESOURCE_SET: "true"
