# CAPA (Cluster API Provider AWS) CAPIProvider
# Installs the AWS infrastructure provider into the management cluster.
#
# Credentials: apply credentials/aws/capa-credentials-secret.yaml BEFORE this
# (Fleet does this automatically if credentials/aws is listed first in the GitRepo paths).
# CAPA reads the Secret named "capa-manager-bootstrap-credentials" in capa-system automatically.
#
# One-time IAM bootstrap (run once per AWS account):
#   clusterawsadm bootstrap iam create-cloudformation-stack
---
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: aws
  namespace: capa-system
spec:
  name: aws
  type: infrastructure
  version: "v2.7.1"   # latest v1beta1-compatible CAPA release
  fetchConfig:
    url: https://github.com/kubernetes-sigs/cluster-api-provider-aws/releases/download/v2.7.1/infrastructure-components.yaml
  variables:
    AWS_REGION: "eu-west-1"   # default region; overridden per cluster via ClusterClass variable
    EXP_MACHINE_POOL: "true"
    EXP_CLUSTER_RESOURCE_SET: "true"
