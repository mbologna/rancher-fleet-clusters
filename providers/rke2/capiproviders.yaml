---
# RKE2 Bootstrap + ControlPlane providers
# Installed into cattle-turtles-system by Turtles CAPI Operator.
# CAPRKE2 v0.24.2+ uses the v1beta2 CAPI contract.
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: rke2-bootstrap
  namespace: cattle-turtles-system
spec:
  name: rke2
  type: bootstrap
  version: "v0.24.2"
  fetchConfig:
    url: https://github.com/rancher/cluster-api-provider-rke2/releases/download/v0.24.2/bootstrap-components.yaml
---
apiVersion: turtles-capi.cattle.io/v1alpha1
kind: CAPIProvider
metadata:
  name: rke2-control-plane
  namespace: cattle-turtles-system
spec:
  name: rke2
  type: controlPlane
  version: "v0.24.2"
  fetchConfig:
    url: https://github.com/rancher/cluster-api-provider-rke2/releases/download/v0.24.2/control-plane-components.yaml
